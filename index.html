<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EME NAILS - Fix Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    
    <style>
        :root { --pink: #ff0077; --purple: #7a00ff; --dark: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--dark); color: white; margin: 0; }
        .header { padding: 15px; background: linear-gradient(135deg, var(--pink), var(--purple)); }
        #step1, #step2 { padding: 20px; max-width: 500px; margin: 0 auto; }
        #step2 { display: none; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .btn-main { background: white; color: black; border: none; padding: 15px; border-radius: 30px; font-weight: bold; width: 100%; font-size: 1.1rem; margin-top: 20px; cursor: pointer; }
        #container { position: relative; border-radius: 20px; overflow: hidden; border: 2px solid var(--pink); margin-top: 15px;}
        video { display: none; }
        canvas { width: 100%; height: auto; background: #000; display: block; }
        #loader { display: none; color: #ffeb3b; font-weight: bold; margin-top: 15px; padding: 10px; border: 1px dashed #ffeb3b; }
        .preview-circle { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--pink); margin: 15px auto; background-size: cover; background-position: center; }
    </style>
</head>
<body>

<div class="header"><h1>EME NAILS</h1></div>

<div id="step1">
    <div class="card">
        <h3>💅 Paso 1: Sube tu diseño</h3>
        <input type="file" id="nailUpload" accept="image/jpeg,image/png">
        <div id="loader">⚡ Procesando... Por favor espera.</div>
        <button id="goStep2" class="btn-main" style="display: none;">Ver en mis manos →</button>
    </div>
</div>

<div id="step2">
    <div class="preview-circle" id="miniPreview"></div>
    <button id="switchCamera" class="btn-main" style="margin: 0 0 15px 0; padding: 10px;">🔄 Cambiar Cámara</button>
    <div id="container">
        <video id="input_video"></video>
        <canvas id="output_canvas" width="640" height="480"></canvas>
    </div>
</div>

<canvas id="crop_canvas" width="150" height="200" style="display:none;"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const cropCanvas = document.getElementById('crop_canvas');
    const cropCtx = cropCanvas.getContext('2d');
    const loader = document.getElementById('loader');
    const btnGo = document.getElementById('goStep2');
    const miniPreview = document.getElementById('miniPreview');

    let nailTexture = null;
    let cameraInstance = null;
    let isFrontCamera = true;

    // Configuración de IA
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });

    // --- PROCESAMIENTO CON TIEMPO LÍMITE (TIMEOUT) ---
    document.getElementById('nailUpload').onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        
        loader.style.display = "block";
        btnGo.style.display = "none";

        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            let processed = false;

            // 1. Ponemos un temporizador de 3 segundos
            const timeout = setTimeout(() => {
                if (!processed) {
                    console.log("IA tardó demasiado, usando recorte manual...");
                    forceCrop(img);
                }
            }, 3000);

            // 2. Intentamos usar la IA
            try {
                await hands.send({image: img});
            } catch (err) {
                console.error("Error en IA:", err);
                forceCrop(img);
            }

            hands.onResults((results) => {
                if (processed) return;
                processed = true;
                clearTimeout(timeout);

                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const tip = results.multiHandLandmarks[0][8]; 
                    applyCrop(img, tip.x, tip.y);
                } else {
                    forceCrop(img);
                }
            });
        };
    };

    function forceCrop(img) {
        applyCrop(img, 0.5, 0.5); // Recorta el centro
    }

    function applyCrop(img, xPct, yPct) {
        cropCtx.clearRect(0, 0, 150, 200);
        const boxW = img.width * 0.2;
        const boxH = boxW * 1.5;
        
        cropCtx.drawImage(
            img, 
            (xPct * img.width) - (boxW/2), (yPct * img.height) - (boxH/2), boxW, boxH, 
            0, 0, 150, 200
        );

        nailTexture = new Image();
        nailTexture.src = cropCanvas.toDataURL();
        miniPreview.style.backgroundImage = `url(${nailTexture.src})`;
        
        loader.style.display = "none";
        btnGo.style.display = "block";
        
        // Preparar para modo cámara
        hands.onResults(onLiveResults);
    }

    btnGo.onclick = () => {
        document.getElementById('step1').style.display = "none";
        document.getElementById('step2').style.display = "block";
        startCamera();
    };

    function onLiveResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        if (isFrontCamera) { canvasCtx.translate(canvasElement.width, 0); canvasCtx.scale(-1, 1); }
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks && nailTexture) {
            for (const landmarks of results.multiHandLandmarks) {
                [4, 8, 12, 16, 20].forEach((tipIdx, i) => {
                    const tip = landmarks[tipIdx];
                    const joint = landmarks[[3, 7, 11, 15, 19][i]];
                    const x = tip.x * 640, y = tip.y * 480;
                    const angle = Math.atan2(y - (joint.y * 480), x - (joint.x * 640)) + Math.PI/2;
                    const nailW = Math.hypot(x - (joint.x * 640), y - (joint.y * 480)) * 1.3;
                    
                    canvasCtx.save();
                    canvasCtx.translate(x, y);
                    canvasCtx.rotate(angle);
                    canvasCtx.beginPath();
                    canvasCtx.ellipse(0, -nailW*0.4, nailW/2, nailW*0.9, 0, 0, 2 * Math.PI);
                    canvasCtx.clip();
                    canvasCtx.drawImage(nailTexture, -nailW/2, -nailW*1.3, nailW, nailW*1.8);
                    canvasCtx.restore();
                });
            }
        }
        canvasCtx.restore();
    }

    function startCamera() {
        if (cameraInstance) cameraInstance.stop();
        cameraInstance = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480,
            facingMode: isFrontCamera ? 'user' : 'environment'
        });
        cameraInstance.start();
    }

    document.getElementById('switchCamera').onclick = () => { isFrontCamera = !isFrontCamera; startCamera(); };
</script>
</body>
</html>
