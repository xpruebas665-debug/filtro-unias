<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EME NAILS Hyper-Realism Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --pink: #ff0077; --dark: #0a0a0a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: white; margin: 0; overflow: hidden; }
        
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }

        .ui-overlay {
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.92); 
            padding: 20px; border-top: 2px solid var(--pink); box-sizing: border-box; 
            z-index: 100; border-radius: 25px 25px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        
        .control-row { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; scrollbar-width: none; }
        .control-row::-webkit-scrollbar { display: none; }

        .btn-ui { 
            background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px 18px; 
            border-radius: 15px; white-space: nowrap; font-size: 0.85rem; cursor: pointer; transition: 0.3s;
        }
        .btn-ui.active { background: var(--pink); border-color: white; font-weight: bold; box-shadow: 0 0 15px var(--pink); }

        .finger-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .f-btn { width: 40px; height: 40px; border-radius: 12px; border: 1px solid #444; background: #111; color: white; cursor: pointer; }
        .f-btn.active { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.3); }

        .btn-pdf { background: #00ff88; color: black; border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="ui-overlay">
    <div class="finger-selector">
        <button class="f-btn active" onclick="selectFinger('all')">Todos</button>
        <button class="f-btn" onclick="selectFinger(0)">P</button>
        <button class="f-btn" onclick="selectFinger(1)">I</button>
        <button class="f-btn" onclick="selectFinger(2)">M</button>
        <button class="f-btn" onclick="selectFinger(3)">A</button>
        <button class="f-btn" onclick="selectFinger(4)">m</button>
    </div>

    <div class="control-row">
        <input type="color" id="c1" value="#ff0077" title="Color Principal">
        <button class="btn-ui active" onclick="setEff('glossy', this)">Hiper Brillo ✨</button>
        <button class="btn-ui" onclick="setEff('mate', this)">Acabado Mate 🌑</button>
        <button class="btn-ui" onclick="setEff('cateye', this)">Ojo de Gato 👁️</button>
    </div>

    <div class="control-row">
        <button class="btn-ui active" onclick="setShp('almond', this)">Almendra Pro</button>
        <button class="btn-ui" onclick="setShp('coffin', this)">Coffin Elite</button>
        <button class="btn-ui" onclick="setShp('stiletto', this)">Stiletto Drama</button>
        <button class="btn-ui" onclick="setShp('square-long', this)">XL Square</button>
    </div>

    <button class="btn-pdf" onclick="generatePDF()">📥 DESCARGAR DISEÑO PDF PROFESIONAL</button>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    let nailState = Array(5).fill().map(() => ({ c1: "#ff0077", effect: "glossy", shape: "almond" }));
    let selectedFinger = 'all'; 

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });

    function selectFinger(index) { selectedFinger = index; document.querySelectorAll('.f-btn').forEach((btn,i)=>btn.classList.toggle('active', index==='all'?i===0:i===(index+1))); }
    function setEff(e, b) { updateNail('effect', e); activateBtn(b); }
    function setShp(s, b) { updateNail('shape', s); activateBtn(b); }
    function activateBtn(b) { b.parentElement.querySelectorAll('.btn-ui').forEach(x=>x.classList.remove('active')); b.classList.add('active'); }
    function updateNail(prop, value) { if(selectedFinger==='all') nailState.forEach(n=>n[prop]=value); else nailState[selectedFinger][prop]=value; }
    document.getElementById('c1').oninput = (e) => updateNail('color', e.target.value);

    // --- EL SECRETO DEL HIPERREALISMO ---
    function drawRealisticNail(ctx, x, y, angle, dist, state) {
        // Ajustamos la uña para que nazca más cerca de la cutícula anatómica
        const xCuticle = x - Math.cos(angle - Math.PI/2) * (dist * 0.1);
        const yCuticle = y - Math.sin(angle - Math.PI/2) * (dist * 0.1);

        let nW = dist * 0.85; // Ancho realista
        let nH = (state.shape === 'stiletto' || state.shape === 'coffin' || state.shape === 'square-long') ? nW * 2.8 : nW * 1.8; // Largo acrílico

        ctx.save();
        ctx.translate(xCuticle, yCuticle);
        ctx.rotate(angle);

        // --- PATH DE LA UÑA ---
        ctx.beginPath();
        if(state.shape === 'almond') {
            ctx.ellipse(0, -nH/4, nW/2, nH/2, 0, 0, 2 * Math.PI);
        } else if(state.shape === 'stiletto') {
            ctx.moveTo(-nW/2, 0); ctx.lineTo(0, -nH); ctx.lineTo(nW/2, 0); ctx.arc(0, 0, nW/2, 0, Math.PI);
        } else if(state.shape === 'coffin') {
            ctx.moveTo(-nW/2, 0); ctx.lineTo(-nW/3, -nH); ctx.lineTo(nW/3, -nH); ctx.lineTo(nW/2, 0); ctx.arc(0, 0, nW/2, 0, Math.PI);
        } else {
            ctx.roundRect(-nW/2, -nH, nW, nH+5, [4, 4, 0, 0]); // XL Square
        }
        ctx.clip(); // Cortamos todo lo que dibujemos dentro de este path

        // --- CAPA 1: COLOR BASE CON VOLUMEN FÍSICO (Oclusión) ---
        // Creamos un degradado radial interno para simular la curvatura de la uña
        let nailGrad = ctx.createRadialGradient(0, -nH/2, nW/4, 0, -nH/2, nW);
        nailGrad.addColorStop(0, state.color); // Centro más claro
        nailGrad.addColorStop(1, adjustColor(state.color, -40)); // Bordes más oscuros (volumen)
        
        ctx.fillStyle = nailGrad;
        ctx.fillRect(-nW, -nH*1.2, nW*2, h*2); // Dibujamos la base

        // --- CAPA 2: EFECTOS ESPECIALES INTELIGENTES ---
        if(state.effect === 'cateye') {
            // Efecto magnético Ojo de Gato dinámico
            let cateyeGrad = ctx.createLinearGradient(-nW, -nH, nW, 0);
            cateyeGrad.addColorStop(0.4, 'transparent');
            cateyeGrad.addColorStop(0.5, 'rgba(255,255,255,0.4)'); // Banda de luz magnética
            cateyeGrad.addColorStop(0.6, 'transparent');
            ctx.fillStyle = cateyeGrad;
            ctx.fillRect(-nW, -nH, nW*2, h*2);
        }

        // --- CAPA 3: ACABADO FOTORREALISTA (Glossy Pro) ---
        if(state.effect === 'glossy') {
            // Simulamos el reflejo especular de una lámpara de salón profesional
            let shineGrad = ctx.createLinearGradient(-nW/2, -nH, nW/2, 0);
            shineGrad.addColorStop(0, 'rgba(255,255,255,0.5)'); // Brillo intenso en la punta
            shineGrad.addColorStop(0.2, 'transparent'); // Transición suave
            
            ctx.fillStyle = shineGrad;
            ctx.fill(); // Rellenamos el path clipado
        } else if (state.effect === 'mate') {
            // Acabado mate: eliminamos el brillo especular
        }

        ctx.restore();
    }

    // Función inteligente para ajustar brillo del color (para sombras físicas)
    function adjustColor(hex, amt) {
        var usePound = true;
        if (hex[0] == "#") { hex = hex.slice(1); usePound = true; }
        var num = parseInt(hex,16);
        var r = (num >> 16) + amt;
        if (r > 255) r = 255; else if  (r < 0) r = 0;
        var b = ((num >> 8) & 0x00FF) + amt;
        if (b > 255) b = 255; else if  (b < 0) b = 0;
        var g = (num & 0x0000FF) + amt;
        if (g > 255) g = 255; else if (g < 0) g = 0;
        return (usePound?"#":"") + (g | (b << 8) | (r << 16)).toString(16);
    }

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Espejo para video espejo (translate -> scale -> translate back)
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                const tips = [4, 8, 12, 16, 20]; // Puntas
                const joints = [3, 7, 11, 15, 19]; // Nudillos superiores

                tips.forEach((tipIdx, i) => {
                    const tip = landmarks[tipIdx];
                    const joint = landmarks[joints[i]];
                    const x = tip.x * canvasElement.width;
                    const y = tip.y * canvasElement.height;
                    const dist = Math.hypot(x - joint.x * canvasElement.width, y - joint.y * canvasElement.height);
                    const angle = Math.atan2(y - joint.y * canvasElement.height, x - joint.x * canvasElement.width) + Math.PI/2;
                    
                    drawRealisticNail(canvasCtx, x, y, angle, dist, nailState[i]);
                });
            }
        }
        canvasCtx.restore();
    }

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start();
    hands.onResults(onResults);

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20);
        doc.text("EME NAILS STUDIO - FICHA TÉCNICA", 20, 20);
        nailState.forEach((n, i) => {
            doc.setFontSize(12);
            doc.text(`Uña ${i+1}: Color ${n.color}, Forma ${n.shape}, Acabado ${n.effect}`, 20, 40 + (i * 10));
        });
        doc.save("eme-nails-diseno-profesional.pdf");
    }
</script>
</body>
</html>
