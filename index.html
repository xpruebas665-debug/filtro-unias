<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EME NAILS - Fast Filter</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    
    <style>
        :root { --pink: #ff0077; --purple: #7a00ff; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #050505; color: white; margin: 0; padding-bottom: 20px; }
        
        .header { padding: 15px; background: linear-gradient(135deg, var(--pink), var(--purple)); margin-bottom: 15px; }
        h1 { margin: 0; font-size: 2rem; letter-spacing: 2px; }

        .controls { margin: 10px auto; padding: 15px; background: #1a1a1a; border-radius: 15px; max-width: 90%; border: 1px solid #333; }
        #container { position: relative; display: inline-block; border-radius: 20px; overflow: hidden; border: 2px solid var(--pink); max-width: 95%; margin-top: 10px;}
        
        video { display: none; }
        canvas { max-width: 100%; height: auto; background: #000; display: block; }

        .btn-camera { 
            background: #fff; color: #000; border: none; padding: 10px 20px; 
            border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 10px;
            width: 100%; font-size: 1rem;
        }
        .btn-camera:active { background: #ccc; }

        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; margin-top: 10px; background: #333; }
        .ready { background: #00ff88; color: #000; font-weight: bold; }
        
        input[type="file"] { margin-top: 10px; color: #ccc; width: 100%; }
        .preview-box { width: 50px; height: 70px; border-radius: 20px 20px 8px 8px; border: 2px solid white; margin: 10px auto; display: none; background-size: cover; background-position: center; }
    </style>
</head>
<body>

<div class="header">
    <h1>EME NAILS</h1>
</div>

<div class="controls">
    <strong>Sube tu diseño:</strong>
    <input type="file" id="nailUpload" accept="image/*">
    <div id="status" class="status-badge">Esperando imagen...</div>
    <div id="texturePreview" class="preview-box"></div>
    <button id="switchCamera" class="btn-camera">🔄 Cambiar a Cámara Trasera</button>
</div>

<div id="container">
    <video id="input_video"></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
</div>

<canvas id="crop_canvas" width="150" height="200" style="display:none;"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const cropCanvas = document.getElementById('crop_canvas');
    const cropCtx = cropCanvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    const previewBox = document.getElementById('texturePreview');
    const switchBtn = document.getElementById('switchCamera');

    let nailTexture = null;
    let cameraMode = null; // Controla la cámara de MediaPipe
    let isFrontCamera = true;
    let processingPhoto = false;

    // Inicializamos la IA con una configuración constante (¡Esto evita el lag!)
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    // --- MANEJO RÁPIDO DE LA IMAGEN ---
    document.getElementById('nailUpload').onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        
        statusDiv.innerText = "⚡ Procesando diseño...";
        statusDiv.className = "status-badge";
        previewBox.style.display = "none";
        processingPhoto = true; // Pausa el filtro de la cámara un momento
        
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            // Mandamos la imagen a la IA para una lectura rápida
            await hands.send({image: img});
            
            hands.onResults((results) => {
                if(!processingPhoto) return; // Evita que se crucen datos con la cámara en vivo
                
                cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
                
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    // La IA detectó una mano en la foto al instante
                    const tip = results.multiHandLandmarks[0][8]; 
                    const boxW = img.width * 0.15;
                    const boxH = boxW * 1.5;
                    cropCtx.drawImage(img, (tip.x * img.width) - (boxW/2), (tip.y * img.height) - (boxH/1.5), boxW, boxH, 0, 0, 150, 200);
                    statusDiv.innerText = "✅ Extracción exitosa";
                } else {
                    // Fallback ultrarrápido: Si la foto es compleja, toma el centro al instante
                    const boxW = Math.min(img.width, img.height) * 0.4;
                    const boxH = boxW * 1.5;
                    cropCtx.drawImage(img, (img.width/2) - (boxW/2), (img.height/2) - (boxH/2), boxW, boxH, 0, 0, 150, 200);
                    statusDiv.innerText = "✅ Diseño centrado listo";
                }

                statusDiv.className = "status-badge ready";
                nailTexture = new Image();
                nailTexture.src = cropCanvas.toDataURL();
                previewBox.style.backgroundImage = `url(${nailTexture.src})`;
                previewBox.style.display = "block";

                processingPhoto = false; // Reactiva el filtro en vivo
                hands.onResults(onLiveResults); // Devolvemos el control a la cámara
            });
        };
    };

    // --- FILTRO EN TIEMPO REAL ---
    function onLiveResults(results) {
        if(processingPhoto) return; // Si está cargando una foto, no dibujes las manos

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Si es cámara frontal, hacemos efecto espejo. Si es trasera, la dejamos normal.
        if (isFrontCamera) {
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
        }
        
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks && nailTexture) {
            for (const landmarks of results.multiHandLandmarks) {
                const tips = [4, 8, 12, 16, 20];
                const joints = [3, 7, 11, 15, 19];

                tips.forEach((tipIdx, i) => {
                    const tip = landmarks[tipIdx];
                    const joint = landmarks[joints[i]];

                    const x = tip.x * canvasElement.width;
                    const y = tip.y * canvasElement.height;
                    const jX = joint.x * canvasElement.width;
                    const jY = joint.y * canvasElement.height;

                    // Ajuste de rotación para cámara trasera (los ángulos se invierten si no hay espejo)
                    let angle = Math.atan2(y - jY, x - jX) + Math.PI/2;
                    if (!isFrontCamera) {
                        angle = Math.atan2(y - jY, x - jX) + Math.PI/2; 
                    }
                    
                    const dist = Math.hypot(x - jX, y - jY);
                    const nailW = dist * 1.3; 
                    const nailH = nailW * 1.8; 

                    canvasCtx.save();
                    canvasCtx.translate(x, y);
                    canvasCtx.rotate(angle);
                    
                    // Corte en forma de uña
                    canvasCtx.beginPath();
                    canvasCtx.ellipse(0, -nailH/4, nailW/2, nailH/2, 0, 0, 2 * Math.PI);
                    canvasCtx.clip(); 
                    canvasCtx.drawImage(nailTexture, -nailW/2, -nailH*0.75, nailW, nailH*1.5);
                    
                    // Brillo
                    const gradient = canvasCtx.createLinearGradient(-nailW/2, -nailH, nailW/2, nailH);
                    gradient.addColorStop(0, "rgba(255,255,255,0.4)");
                    gradient.addColorStop(0.5, "rgba(255,255,255,0)");
                    canvasCtx.fillStyle = gradient;
                    canvasCtx.fill();

                    canvasCtx.restore();
                });
            }
        }
        canvasCtx.restore();
    }

    // --- INICIADOR DE CÁMARA Y CAMBIO FRONTAL/TRASERA ---
    function startCamera() {
        if (cameraMode) { cameraMode.stop(); } // Detiene la cámara anterior
        
        hands.onResults(onLiveResults);
        
        cameraMode = new Camera(videoElement, {
            onFrame: async () => { if(!processingPhoto) await hands.send({image: videoElement}); },
            width: 640, height: 480,
            facingMode: isFrontCamera ? 'user' : 'environment' // user = Frontal, environment = Trasera
        });
        cameraMode.start();
    }

    switchBtn.addEventListener('click', () => {
        isFrontCamera = !isFrontCamera;
        switchBtn.innerText = isFrontCamera ? "🔄 Cambiar a Cámara Trasera" : "🔄 Cambiar a Cámara Frontal";
        startCamera();
    });

    // Encender al iniciar
    startCamera();
</script>

</body>
</html>
