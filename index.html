<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Glow Studio Nail AI Filter Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #111; color: white; margin: 0; padding: 0; }
        .header { padding: 20px; background: linear-gradient(90deg, #ff0077, #aa00ff); box-shadow: 0 4px 15px rgba(255, 0, 119, 0.5); }
        h1 { margin: 0; font-size: 2.5em; text-transform: uppercase; letter-spacing: 2px; }
        #container { position: relative; margin-top: 30px; display: inline-block; line-height: 0; }
        video { display: none; } /* Ocultamos el video crudo */
        canvas { border: 4px solid #ff0077; border-radius: 20px; max-width: 95vw; background: black; box-shadow: 0 0 25px rgba(255, 0, 119, 0.7); }
        .controls { margin: 30px; padding: 20px; background: #222; border-radius: 15px; display: inline-block; }
        input[type="file"] { color: white; cursor: pointer; margin-top: 10px; }
        #status { color: #00ffcc; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="header">
    <h1>💅 Nail AI Master</h1>
</div>

<div class="controls">
    <label>1. Sube una foto de un diseño (que se vea la mano): </label><br>
    <input type="file" id="nailUpload" accept="image/*">
    <div id="status">Esperando diseño...</div>
</div>

<div id="container">
    <video id="input_video"></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
</div>

<canvas id="crop_canvas" width="100" height="100" style="display:none;"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const cropCanvas = document.getElementById('crop_canvas');
    const cropCtx = cropCanvas.getContext('2d');
    const status = document.getElementById('status');

    let extractedNailTextureImage = null;

    // Configuración avanzada de la IA con modelo de complejidad total (más potente)
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 2, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

    // --- PASO 1: DETECTAR Y RECORTAR EL DISEÑO DE LA FOTO SUBIDA ---
    document.getElementById('nailUpload').onchange = async (e) => {
        status.innerText = "Cargando diseño...";
        const file = e.target.files[0];
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            // Usamos la IA para encontrar la uña en la foto subida
            await hands.send({image: img});
            
            // Re-configuramos la IA para capturar el resultado del recorte
            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    const indexTip = landmarks[8]; // Punta del índice de la foto subida
                    const indexJoint = landmarks[7]; // Articulación DIP del índice

                    // Recortamos un área pequeña alrededor de la uña
                    const size = img.width * 0.1; // Ajuste para el tamaño de la uña acrílica
                    cropCtx.clearRect(0, 0, 100, 100);
                    cropCtx.drawImage(
                        img, 
                        indexTip.x * img.width - (size/2), indexTip.y * img.height - (size/2), size, size, 
                        0, 0, 100, 100
                    );
                    
                    extractedNailTextureImage = new Image();
                    extractedNailTextureImage.src = cropCanvas.toDataURL();
                    status.innerText = "✅ Diseño detectado. ¡Pon tu mano!";
                } else {
                    status.innerText = "❌ No detecté una mano en la foto. Intenta otra.";
                }
                
                // Re-configuramos la IA para volver al modo cámara para el filtro en tiempo real
                hands.onResults(onLiveResults);
            });
        };
    };

    // --- PASO 2: APLICAR EL FILTRO EN TIEMPO REAL CON ROTACIÓN Y ESCALA ---
    function onLiveResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Espejo para la cámara (translate -> scale -> translate back)
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks && extractedNailTextureImage) {
            for (const landmarks of results.multiHandLandmarks) {
                // Puntos de las puntas (Tips) y las articulaciones justo debajo (Joints) para calcular rotación y escala
                const fingerTips = [4, 8, 12, 16, 20]; // Pulgar, Índice, Medio, Anular, Meñique
                const fingerJoints = [3, 7, 11, 15, 19]; 

                fingerTips.forEach((tipIndex, i) => {
                    const tip = landmarks[tipIndex];
                    const joint = landmarks[fingerJoints[i]];

                    // 1. Calcular Ángulo y Rotación (Usando atan2 para el vector)
                    // (x, y) son coordenadas normalizadas (0 a 1). Calculamos el ángulo del dedo.
                    const angle = Math.atan2(tip.y - joint.y, tip.x - joint.x) + Math.PI/2; 
                    
                    // 2. Calcular Escala (Pixel length)
                    // Convertimos a píxeles para escalar la textura
                    const pixelLength = Math.sqrt(
                        Math.pow((tip.x - joint.x) * canvasElement.width, 2) + 
                        Math.pow((tip.y - joint.y) * canvasElement.height, 2)
                    );
                    
                    const x = tip.x * canvasElement.width;
                    const y = tip.y * canvasElement.height;

                    canvasCtx.save();
                    canvasCtx.translate(x, y); // Movemos el origen a la punta del dedo
                    canvasCtx.rotate(angle); // Rotamos el canvas
                    
                    // 3. Dibujamos el diseño recortado (El ancho es el largo escalado)
                    const nWidth = pixelLength / 3.5; 
                    const nHeight = nWidth * 1.5; // Mantenemos la forma alargada
                    canvasCtx.drawImage(extractedNailTextureImage, -nWidth/2, -nHeight/2, nWidth, nHeight);
                    
                    canvasCtx.restore();
                });
            }
        }
        canvasCtx.restore();
    }

    // Iniciar cámara y ciclo de IA
    hands.onResults(onLiveResults);
    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start();
</script>

</body>
</html>
