<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EME NAILS Pro Hyper-Lite</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --pink: #ff0077; --dark: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        
        .ui-panel {
            position: absolute; bottom: 0; width: 100%; background: rgba(10,10,10,0.95); 
            padding: 15px; border-top: 2px solid var(--pink); border-radius: 20px 20px 0 0;
            z-index: 100; box-sizing: border-box;
        }

        .scroll-row { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; scrollbar-width: none; }
        .scroll-row::-webkit-scrollbar { display: none; }

        .btn { 
            background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px 14px; 
            border-radius: 12px; font-size: 0.8rem; cursor: pointer; white-space: nowrap;
        }
        .btn.active { background: var(--pink); border-color: white; font-weight: bold; }

        .f-selector { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .f-btn { width: 38px; height: 38px; border-radius: 10px; border: 1px solid #444; background: #111; color: white; }
        .f-btn.active { border-color: #00ff88; color: #00ff88; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="ui-panel">
    <div class="f-selector">
        <button class="f-btn active" onclick="selF('all')">All</button>
        <button class="f-btn" onclick="selF(0)">P</button>
        <button class="f-btn" onclick="selF(1)">I</button>
        <button class="f-btn" onclick="selF(2)">M</button>
        <button class="f-btn" onclick="selF(3)">A</button>
        <button class="f-btn" onclick="selF(4)">m</button>
        <button class="f-btn" onclick="toggleCam()" style="margin-left:15px; background:var(--pink)">🔄</button>
    </div>

    <div class="scroll-row">
        <input type="color" id="color1" value="#ff0077" style="width:40px; height:40px; border:none; background:none;">
        <button class="btn active" onclick="setEff('glossy', this)">Ultra Glossy ✨</button>
        <button class="btn" onclick="setEff('mate', this)">Mate Real 🌑</button>
        <button class="btn" onclick="setEff('cateye', this)">Cat Eye 👁️</button>
    </div>

    <div class="scroll-row">
        <button class="btn active" onclick="setShp('almond', this)">Almendra</button>
        <button class="btn" onclick="setShp('coffin', this)">Coffin</button>
        <button class="btn" onclick="setShp('stiletto', this)">Stiletto</button>
        <button class="btn" onclick="setShp('square-long', this)">XL Square</button>
    </div>

    <button onclick="genPDF()" style="background:#00ff88; color:#000; width:100%; border:none; padding:12px; border-radius:10px; font-weight:bold; margin-top:5px;">📥 DESCARGAR DISEÑO PDF</button>
</div>

<script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    
    let nailState = Array(5).fill().map(() => ({ c1: "#ff0077", effect: "glossy", shape: "almond" }));
    let currentF = 'all';
    let isFront = true;
    let cameraInstance = null;

    // CONFIGURACIÓN DE IA ULTRA LIGERA (Evita que se trabe)
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ 
        maxNumHands: 1, 
        modelComplexity: 0, // 0 = Muy rápido, 1 = Pesado
        minDetectionConfidence: 0.5, 
        minTrackingConfidence: 0.5 
    });

    function selF(i) { currentF = i; document.querySelectorAll('.f-btn').forEach((b,idx)=>b.classList.toggle('active', i==='all'?idx===0:idx===(i+1))); }
    function setEff(e, b) { upd('effect', e); act(b); }
    function setShp(s, b) { upd('shape', s); act(b); }
    function act(b) { b.parentElement.querySelectorAll('.btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); }
    function upd(p, v) { if(currentF==='all') nailState.forEach(n=>n[p]=v); else nailState[currentF][p]=v; }
    document.getElementById('color1').oninput = (e) => upd('c1', e.target.value);

    // DIBUJO HIPERREALISTA OPTIMIZADO
    function drawHyperNail(x, y, angle, dist, s) {
        let w = dist * 0.88; 
        let h = (s.shape === 'stiletto' || s.shape === 'coffin' || s.shape === 'square-long') ? w * 2.8 : w * 1.8;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        // Path de la uña
        ctx.beginPath();
        if(s.shape === 'almond') ctx.ellipse(0, -h/4, w/2, h/2, 0, 0, 2*Math.PI);
        else if(s.shape === 'stiletto') { ctx.moveTo(-w/2,0); ctx.lineTo(0,-h); ctx.lineTo(w/2,0); ctx.arc(0,0,w/2,0,Math.PI); }
        else if(s.shape === 'coffin') { ctx.moveTo(-w/2,0); ctx.lineTo(-w/3,-h); ctx.lineTo(w/3,-h); ctx.lineTo(w/2,0); ctx.arc(0,0,w/2,0,Math.PI); }
        else { ctx.roundRect(-w/2, -h, w, h+3, [3,3,0,0]); }
        ctx.clip();

        // 1. VOLUMEN (Sombra lateral realista)
        let grad = ctx.createRadialGradient(0, -h/2, w/5, 0, -h/2, w);
        grad.addColorStop(0, s.c1);
        grad.addColorStop(1, shadeColor(s.c1, -35));
        ctx.fillStyle = grad;
        ctx.fillRect(-w, -h*1.5, w*2, h*2);

        // 2. EFECTOS
        if(s.effect === 'cateye') {
            let cg = ctx.createLinearGradient(-w, -h, w, 0);
            cg.addColorStop(0.4, 'transparent'); cg.addColorStop(0.5, 'rgba(255,255,255,0.4)'); cg.addColorStop(0.6, 'transparent');
            ctx.fillStyle = cg; ctx.fillRect(-w, -h, w*2, h*2);
        }

        // 3. REFLEJO DE LÁMPARA (Especular)
        if(s.effect !== 'mate') {
            let shine = ctx.createLinearGradient(-w/2, -h, w/2, 0);
            shine.addColorStop(0, 'rgba(255,255,255,0.45)'); 
            shine.addColorStop(0.3, 'transparent');
            ctx.fillStyle = shine;
            ctx.fill();
        }

        ctx.restore();
    }

    function shadeColor(color, percent) {
        let num = parseInt(color.replace("#",""), 16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) + amt, G = (num >> 8 & 0x00FF) + amt, B = (num & 0x0000FF) + amt;
        return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1);
    }

    function onResults(results) {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (isFront) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
            const tips = [4, 8, 12, 16, 20];
            const joints = [3, 7, 11, 15, 19];
            tips.forEach((tIdx, i) => {
                const tip = results.multiHandLandmarks[0][tIdx];
                const joint = results.multiHandLandmarks[0][joints[i]];
                const x = tip.x * canvas.width, y = tip.y * canvas.height;
                const d = Math.hypot(x - joint.x * canvas.width, y - joint.y * canvas.height);
                const a = Math.atan2(y - joint.y * canvas.height, x - joint.x * canvas.width) + Math.PI/2;
                drawHyperNail(x, y, a, d, nailState[i]);
            });
        }
        ctx.restore();
    }

    async function startCam() {
        if(cameraInstance) await cameraInstance.stop();
        cameraInstance = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 640, height: 480, facingMode: isFront ? 'user' : 'environment'
        });
        cameraInstance.start();
    }

    function toggleCam() { isFront = !isFront; startCam(); }
    function genPDF() {
        const doc = new jspdf.jsPDF();
        doc.text("DISEÑO EME NAILS PRO", 20, 20);
        nailState.forEach((n, i) => doc.text(`Uña ${i+1}: ${n.shape}, ${n.effect}, ${n.c1}`, 20, 40 + i*10));
        doc.save("eme-nails.pdf");
    }

    hands.onResults(onResults);
    startCam();
</script>
</body>
</html>
