<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EME NAILS - AI Preview</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    
    <style>
        :root { --pink: #ff0077; --purple: #7a00ff; --dark: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--dark); color: white; margin: 0; overflow-x: hidden; }
        
        .header { padding: 20px; background: linear-gradient(135deg, var(--pink), var(--purple)); margin-bottom: 20px; }
        h1 { margin: 0; font-size: 2.2rem; letter-spacing: 3px; }

        /* Vistas por pasos */
        #step1, #step2 { padding: 20px; max-width: 500px; margin: 0 auto; }
        #step2 { display: none; }

        .card { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .btn-main { 
            background: white; color: black; border: none; padding: 15px 30px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; 
            font-size: 1.1rem; margin-top: 20px; transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.95); background: #ff0077; color: white; }

        #container { position: relative; display: inline-block; border-radius: 20px; overflow: hidden; border: 2px solid var(--pink); width: 100%; margin-top: 15px;}
        video { display: none; }
        canvas { width: 100%; height: auto; background: #000; display: block; }

        .preview-circle { 
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--pink); 
            margin: 20px auto; background-size: cover; background-position: center; 
        }

        #loader { display: none; margin-top: 10px; color: var(--pink); font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>EME NAILS</h1>
</div>

<div id="step1">
    <div class="card">
        <h3>💅 Paso 1: Sube tu diseño</h3>
        <p>Selecciona una foto de uñas o un patrón que te guste.</p>
        <input type="file" id="nailUpload" accept="image/*" style="width: 100%;">
        <div id="loader">⚡ Procesando con IA...</div>
        <button id="goStep2" class="btn-main" style="display: none;">Ver en mis manos →</button>
    </div>
</div>

<div id="step2">
    <div class="preview-circle" id="miniPreview"></div>
    <button id="switchCamera" class="btn-main" style="margin-top: 0; margin-bottom: 15px; padding: 10px;">🔄 Cambiar Cámara</button>
    
    <div id="container">
        <video id="input_video"></video>
        <canvas id="output_canvas" width="640" height="480"></canvas>
    </div>
    
    <button onclick="location.reload()" class="btn-main" style="background: transparent; color: white; border: 1px solid #444;">Subir otro diseño</button>
</div>

<canvas id="crop_canvas" width="150" height="200" style="display:none;"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const cropCanvas = document.getElementById('crop_canvas');
    const cropCtx = cropCanvas.getContext('2d');
    
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const loader = document.getElementById('loader');
    const btnGo = document.getElementById('goStep2');
    const miniPreview = document.getElementById('miniPreview');

    let nailTexture = null;
    let isFrontCamera = true;
    let cameraInstance = null;

    // IA configurada para máxima velocidad
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });

    // --- PROCESAR FOTO (PASO 1) ---
    document.getElementById('nailUpload').onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        
        loader.style.display = "block";
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            // Analizar la foto
            await hands.send({image: img});
            
            hands.onResults((results) => {
                cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
                
                // Intenta detectar uña, si no, toma el centro (fallback inmediato)
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const tip = results.multiHandLandmarks[0][8]; 
                    const boxW = img.width * 0.15;
                    const boxH = boxW * 1.5;
                    cropCtx.drawImage(img, (tip.x * img.width) - (boxW/2), (tip.y * img.height) - (boxH/1.5), boxW, boxH, 0, 0, 150, 200);
                } else {
                    const boxW = Math.min(img.width, img.height) * 0.4;
                    const boxH = boxW * 1.5;
                    cropCtx.drawImage(img, (img.width/2) - (boxW/2), (img.height/2) - (boxH/2), boxW, boxH, 0, 0, 150, 200);
                }

                nailTexture = new Image();
                nailTexture.src = cropCanvas.toDataURL();
                miniPreview.style.backgroundImage = `url(${nailTexture.src})`;
                
                loader.style.display = "none";
                btnGo.style.display = "block";
                
                // Limpiar resultados para el modo cámara
                hands.onResults(onLiveResults);
            });
        };
    };

    // --- ACTIVAR CÁMARA (PASO 2) ---
    btnGo.onclick = () => {
        step1.style.display = "none";
        step2.style.display = "block";
        startCamera();
    };

    function onLiveResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        if (isFrontCamera) {
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
        }
        
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks && nailTexture) {
            for (const landmarks of results.multiHandLandmarks) {
                const tips = [4, 8, 12, 16, 20];
                const joints = [3, 7, 11, 15, 19];

                tips.forEach((tipIdx, i) => {
                    const tip = landmarks[tipIdx];
                    const joint = landmarks[joints[i]];
                    const x = tip.x * 640; const y = tip.y * 480;
                    const jX = joint.x * 640; const jY = joint.y * 480;

                    const angle = Math.atan2(y - jY, x - jX) + Math.PI/2;
                    const dist = Math.hypot(x - jX, y - jY);
                    const nailW = dist * 1.3; 
                    const nailH = nailW * 1.8; 

                    canvasCtx.save();
                    canvasCtx.translate(x, y);
                    canvasCtx.rotate(angle);
                    
                    // Forma de uña almendrada
                    canvasCtx.beginPath();
                    canvasCtx.ellipse(0, -nailH/4, nailW/2, nailH/2, 0, 0, 2 * Math.PI);
                    canvasCtx.clip(); 
                    canvasCtx.drawImage(nailTexture, -nailW/2, -nailH*0.75, nailW, nailH*1.5);
                    
                    // Capa de brillo glossy
                    const grad = canvasCtx.createLinearGradient(-nailW/2, -nailH, nailW/2, nailH);
                    grad.addColorStop(0, "rgba(255,255,255,0.3)");
                    grad.addColorStop(0.5, "rgba(255,255,255,0)");
                    canvasCtx.fillStyle = grad;
                    canvasCtx.fill();

                    canvasCtx.restore();
                });
            }
        }
        canvasCtx.restore();
    }

    function startCamera() {
        if (cameraInstance) cameraInstance.stop();
        cameraInstance = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480,
            facingMode: isFrontCamera ? 'user' : 'environment'
        });
        cameraInstance.start();
    }

    document.getElementById('switchCamera').onclick = () => {
        isFrontCamera = !isFrontCamera;
        startCamera();
    };
</script>

</body>
</html>
