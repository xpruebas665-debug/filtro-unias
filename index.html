<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IA Nail Filter - Vercel</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; }
        .header { padding: 20px; background: #ff0077; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #container { position: relative; margin-top: 20px; display: inline-block; }
        video { display: none; } /* Ocultamos el video crudo */
        canvas { border: 4px solid #ff0077; border-radius: 20px; max-width: 95vw; background: #000; }
        .controls { margin: 20px; padding: 15px; background: #333; border-radius: 10px; display: inline-block; }
        input[type="file"] { color: white; }
    </style>
</head>
<body>

<div class="header">
    <h1>💅 Nail Art AI Preview</h1>
</div>

<div class="controls">
    <label>1. Sube tu diseño de uña: </label>
    <input type="file" id="nailUpload" accept="image/*">
</div>

<div id="container">
    <video id="input_video"></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const nailInput = document.getElementById('nailUpload');

    let nailImage = new Image();
    nailInput.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => { nailImage.src = event.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    function onResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                // Puntos de las puntas de los dedos (Índice, Medio, Anular, Meñique, Pulgar)
                const tips = [4, 8, 12, 16, 20];
                
                tips.forEach(index => {
                    const point = landmarks[index];
                    if(nailImage.complete && nailImage.src) {
                        // Dibujamos el diseño sobre la punta detectada
                        const size = 30; // Tamaño de la uña
                        canvasCtx.drawImage(
                            nailImage, 
                            (1 - point.x) * canvasElement.width - (size/2), 
                            point.y * canvasElement.height - (size/2), 
                            size, size * 1.5
                        );
                    }
                });
            }
        }
        canvasCtx.restore();
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start();
</script>

</body>
</html>
