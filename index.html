<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EME NAILS - AI Filter</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <style>
        :root { --pink: #ff0077; --purple: #7a00ff; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0a0a0a; color: white; margin: 0; }
        
        .header { 
            padding: 25px; 
            background: linear-gradient(135deg, var(--pink), var(--purple));
            box-shadow: 0 4px 20px rgba(255, 0, 119, 0.4);
            margin-bottom: 20px;
        }
        
        h1 { margin: 0; font-size: 2.5rem; letter-spacing: 3px; font-weight: 800; }

        .controls { 
            margin: 20px auto; 
            padding: 20px; 
            background: #1a1a1a; 
            border-radius: 15px; 
            max-width: 500px;
            border: 1px solid #333;
        }

        #container { position: relative; display: inline-block; line-height: 0; border-radius: 20px; overflow: hidden; border: 3px solid var(--pink); }
        video { display: none; }
        canvas { max-width: 100%; height: auto; background: #000; }

        .status-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
            background: #333;
        }
        .ready { background: #00ff88; color: #000; font-weight: bold; }
        
        input[type="file"] { margin-top: 10px; color: #ccc; }
    </style>
</head>
<body>

<div class="header">
    <h1>EME NAILS</h1>
</div>

<div class="controls">
    <strong>1. Sube tu diseño favorito</strong><br>
    <small>(Asegúrate de que se vean bien las uñas en la foto)</small><br>
    <input type="file" id="nailUpload" accept="image/*">
    <div id="status" class="status-badge">Esperando imagen...</div>
</div>

<div id="container">
    <video id="input_video"></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
</div>

<canvas id="crop_canvas" width="128" height="128" style="display:none;"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const cropCanvas = document.getElementById('crop_canvas');
    const cropCtx = cropCanvas.getContext('2d');
    const statusDiv = document.getElementById('status');

    let nailTexture = null;

    // Configuración de la IA con máxima precisión (Complejidad 1 para balance de velocidad)
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });

    // --- ESCANEO INTELIGENTE DE LA FOTO SUBIDA ---
    document.getElementById('nailUpload').onchange = async (e) => {
        statusDiv.innerText = "Escaneando diseño con IA...";
        statusDiv.className = "status-badge";
        
        const file = e.target.files[0];
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        img.onload = async () => {
            // Cambiamos temporalmente a modo de alta precisión para la foto estática
            hands.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.4 });
            
            await hands.send({image: img});
            
            const onPhotoResult = (results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    // Usamos la punta del dedo medio (12) o índice (8) para el recorte
                    const tip = landmarks[12]; 
                    
                    // Recorte inteligente: ajustamos el tamaño según la imagen
                    const boxSize = img.width * 0.12; 
                    cropCtx.clearRect(0, 0, 128, 128);
                    cropCtx.drawImage(
                        img, 
                        tip.x * img.width - (boxSize/2), tip.y * img.height - (boxSize/2), boxSize, boxSize, 
                        0, 0, 128, 128
                    );
                    
                    nailTexture = new Image();
                    nailTexture.src = cropCanvas.toDataURL();
                    statusDiv.innerText = "✅ DISEÑO LISTO";
                    statusDiv.className = "status-badge ready";
                } else {
                    statusDiv.innerText = "❌ IA: No veo la mano claramente. Prueba otra foto.";
                }
                // Volvemos al modo cámara
                hands.onResults(onLiveResults);
            };
            
            hands.onResults(onPhotoResult);
        };
    };

    // --- APLICACIÓN EN TIEMPO REAL ---
    function onLiveResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Espejo
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks && nailTexture) {
            for (const landmarks of results.multiHandLandmarks) {
                // Puntas de los 5 dedos
                const tips = [4, 8, 12, 16, 20];
                const joints = [3, 7, 11, 15, 19];

                tips.forEach((tipIdx, i) => {
                    const tip = landmarks[tipIdx];
                    const joint = landmarks[joints[i]];

                    // Calculamos rotación basada en la inclinación del dedo
                    const angle = Math.atan2(tip.y - joint.y, tip.x - joint.x) + Math.PI/2;
                    
                    // Calculamos tamaño basado en la distancia entre puntos (perspectiva)
                    const dist = Math.hypot((tip.x - joint.x) * 640, (tip.y - joint.y) * 480);
                    const nailW = dist * 0.45;
                    const nailH = nailW * 1.4;

                    canvasCtx.save();
                    canvasCtx.translate(tip.x * 640, tip.y * 480);
                    canvasCtx.rotate(angle);
                    
                    // Dibujamos la textura con un poco de transparencia para que se mezcle mejor
                    canvasCtx.globalAlpha = 0.9;
                    canvasCtx.drawImage(nailTexture, -nailW/2, -nailH/1.5, nailW, nailH);
                    canvasCtx.restore();
                });
            }
        }
        canvasCtx.restore();
    }

    hands.onResults(onLiveResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start();
</script>

</body>
</html>
