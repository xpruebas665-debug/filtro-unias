<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EME NAILS Studio Elite</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --pink: #ff0077; --dark: #080808; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        
        .header { position: absolute; top: 0; width: 100%; z-index: 10; padding: 10px; display: flex; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }

        .studio-panel {
            position: absolute; bottom: 0; width: 100%; z-index: 10;
            background: rgba(15, 15, 15, 0.98); padding: 15px;
            border-top: 2px solid var(--pink); border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column; gap: 12px; box-sizing: border-box;
        }

        .scroll-row { display: flex; overflow-x: auto; gap: 10px; padding: 5px 0; scrollbar-width: none; }
        .scroll-row::-webkit-scrollbar { display: none; }

        .chip { background: #222; border: 1px solid #444; padding: 8px 15px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
        .chip.active { background: var(--pink); border-color: var(--pink); }

        .finger-selector { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
        .finger-btn { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #555; background: #111; color: white; font-size: 0.7rem; cursor: pointer; }
        .finger-btn.selected { background: #00ff88; color: black; border-color: #00ff88; }

        .btn-pdf { background: white; color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div class="header">
    <span style="letter-spacing:2px; font-weight:bold;">EME NAILS PRO</span>
    <button onclick="toggleCamera()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">🔄</button>
</div>

<div id="container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="studio-panel">
    <div class="finger-selector" id="fingerSelector">
        <button class="finger-btn selected" onclick="selectFinger('all')">Todos</button>
        <button class="finger-btn" onclick="selectFinger(0)">P</button>
        <button class="finger-btn" onclick="selectFinger(1)">I</button>
        <button class="finger-btn" onclick="selectFinger(2)">M</button>
        <button class="finger-btn" onclick="selectFinger(3)">A</button>
        <button class="finger-btn" onclick="selectFinger(4)">m</button>
    </div>

    <div class="scroll-row" id="shapeRow">
        <div class="chip active" onclick="setShape('almond', this)">Almendra</div>
        <div class="chip" onclick="setShape('coffin', this)">Coffin</div>
        <div class="chip" onclick="setShape('stiletto', this)">Stiletto</div>
        <div class="chip" onclick="setShape('square', this)">Cuadrada</div>
    </div>

    <div class="scroll-row">
        <input type="color" id="colorPicker" value="#ff0077" style="width:40px; height:40px; border:none; background:none;">
        <div class="chip" onclick="setSticker('🌸')">🌸</div>
        <div class="chip" onclick="setSticker('⭐')">⭐</div>
        <div class="chip" onclick="setSticker('💎')">💎</div>
        <div class="chip" onclick="setSticker('✨')">✨</div>
        <div class="chip" onclick="setSticker('🔥')">🔥</div>
        <div class="chip" onclick="setSticker('none')">Limpiar</div>
    </div>

    <button class="btn-pdf" onclick="generatePDF()">📥 DESCARGAR DISEÑO PDF</button>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    // Estado del diseño por dedo: [Pulgar, Índice, Medio, Anular, Meñique]
    let nailState = Array(5).fill().map(() => ({ color: "#ff0077", sticker: "none", shape: "almond" }));
    let selectedFinger = 'all'; // 'all' o índice 0-4
    let isFrontCamera = true;
    let cameraInstance = null;

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.4, minTrackingConfidence: 0.4 });

    function selectFinger(index) {
        selectedFinger = index;
        document.querySelectorAll('.finger-btn').forEach((btn, i) => {
            btn.classList.toggle('selected', index === 'all' ? i === 0 : i === (index + 1));
        });
    }

    function setShape(shape, el) {
        applyToSelected('shape', shape);
        document.querySelectorAll('#shapeRow .chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    function setSticker(sticker) { applyToSelected('sticker', sticker); }
    document.getElementById('colorPicker').oninput = (e) => applyToSelected('color', e.target.value);

    function applyToSelected(prop, value) {
        if (selectedFinger === 'all') {
            nailState.forEach(n => n[prop] = value);
        } else {
            nailState[selectedFinger][prop] = value;
        }
    }

    function drawNail(ctx, x, y, angle, dist, state) {
        let nW = dist * 0.85;
        let nH = state.shape === 'stiletto' || state.shape === 'coffin' ? nW * 2.6 : nW * 1.7;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        // 1. Base con degradado de volumen (Realismo)
        const nailGrad = ctx.createLinearGradient(-nW/2, 0, nW/2, 0);
        nailGrad.addColorStop(0, adjustColor(state.color, -30)); // Sombra lateral
        nailGrad.addColorStop(0.5, state.color);
        nailGrad.addColorStop(1, adjustColor(state.color, -30));
        
        ctx.fillStyle = nailGrad;
        ctx.beginPath();
        if(state.shape === 'almond') {
            ctx.ellipse(0, -nH/4, nW/2, nH/2, 0, 0, 2 * Math.PI);
        } else if(state.shape === 'coffin') {
            ctx.moveTo(-nW/2, 0); ctx.lineTo(-nW/3, -nH); ctx.lineTo(nW/3, -nH); ctx.lineTo(nW/2, 0); ctx.closePath();
        } else if(state.shape === 'stiletto') {
            ctx.moveTo(-nW/2, 0); ctx.lineTo(0, -nH); ctx.lineTo(nW/2, 0); ctx.closePath();
        } else {
            ctx.roundRect(-nW/2, -nH, nW, nH, [4, 4, 0, 0]);
        }
        ctx.fill();

        // 2. Brillo Glossy (Reflejo de luz)
        const shine = ctx.createLinearGradient(0, -nH, 0, 0);
        shine.addColorStop(0, "rgba(255,255,255,0.4)");
        shine.addColorStop(0.4, "transparent");
        ctx.fillStyle = shine;
        ctx.fill();

        // 3. Sticker
        if(state.sticker !== 'none') {
            ctx.font = `${nW/1.8}px Arial`;
            ctx.textAlign = "center";
            ctx.fillText(state.sticker, 0, -nH/2.5);
        }
        ctx.restore();
    }

    function adjustColor(hex, amt) {
        var usePound = true;
        if (hex[0] == "#") { hex = hex.slice(1); usePound = true; }
        var num = parseInt(hex,16);
        var r = (num >> 16) + amt;
        if (r > 255) r = 255; else if  (r < 0) r = 0;
        var b = ((num >> 8) & 0x00FF) + amt;
        if (b > 255) b = 255; else if  (b < 0) b = 0;
        var g = (num & 0x0000FF) + amt;
        if (g > 255) g = 255; else if (g < 0) g = 0;
        return (usePound?"#":"") + (g | (b << 8) | (r << 16)).toString(16);
    }

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        if (isFrontCamera) { canvasCtx.translate(canvasElement.width, 0); canvasCtx.scale(-1, 1); }
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                const fingerIndices = [4, 8, 12, 16, 20];
                const jointIndices = [3, 7, 11, 15, 19];

                fingerIndices.forEach((tipIdx, i) => {
                    const tip = landmarks[tipIdx];
                    const joint = landmarks[jointIndices[i]];
                    const x = tip.x * canvasElement.width;
                    const y = tip.y * canvasElement.height;
                    const jX = joint.x * canvasElement.width;
                    const jY = joint.y * canvasElement.height;
                    const angle = Math.atan2(y - jY, x - jX) + Math.PI/2;
                    const dist = Math.hypot(x - jX, y - jY);

                    drawNail(canvasCtx, x, y, angle, dist, nailState[i]);
                });
            }
        }
        canvasCtx.restore();
    }

    function startCamera() {
        if (cameraInstance) cameraInstance.stop();
        cameraInstance = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720,
            facingMode: isFrontCamera ? 'user' : 'environment'
        });
        cameraInstance.start();
    }

    function toggleCamera() { isFrontCamera = !isFrontCamera; startCamera(); }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20); doc.text("EME NAILS STUDIO - PEDIDO", 20, 20);
        nailState.forEach((n, i) => {
            let name = ["Pulgar", "Índice", "Medio", "Anular", "Meñique"][i];
            doc.setFontSize(12); doc.text(`${name}: Color ${n.color}, Forma ${n.shape}, Arte ${n.sticker}`, 20, 40 + (i * 10));
        });
        doc.save("diseno-personalizado.pdf");
    }

    hands.onResults(onResults);
    startCamera();
</script>
</body>
</html>
