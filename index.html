<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EME NAILS Hyper-Realism Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --pink: #ff0077; --purple: #7a00ff; --dark: #080808; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: white; margin: 0; overflow: hidden; }
        
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }

        .studio-panel {
            position: absolute; bottom: 0; width: 100%; z-index: 10;
            background: rgba(15, 15, 15, 0.98); padding: 15px;
            border-top: 2px solid var(--pink); border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column; gap: 12px; box-sizing: border-box;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .scroll-row { display: flex; overflow-x: auto; gap: 8px; padding: 5px 0; scrollbar-width: none; }
        .scroll-row::-webkit-scrollbar { display: none; }

        .chip { background: #222; border: 1px solid #444; padding: 8px 15px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .chip.active { background: var(--pink); border-color: white; font-weight: bold; }

        .finger-selector { display: flex; justify-content: center; gap: 6px; margin-bottom: 5px; }
        .finger-btn { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #555; background: #111; color: white; font-size: 0.7rem; cursor: pointer; }
        .finger-btn.selected { background: #00ff88; color: black; border-color: #00ff88; }

        .btn-pdf { background: #00ff88; color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; }
        .btn-camera { position: absolute; top: 15px; right: 15px; z-index: 20; background: var(--pink); color: white; border: none; padding: 10px; border-radius: 50%; width: 45px; height: 45px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

<button class="btn-camera" onclick="toggleCamera()">🔄</button>

<div id="container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="studio-panel">
    <div class="finger-selector" id="fingerSelector">
        <button class="finger-btn selected" onclick="selectFinger('all')">Todos</button>
        <button class="finger-btn" onclick="selectFinger(0)">P</button>
        <button class="finger-btn" onclick="selectFinger(1)">I</button>
        <button class="finger-btn" onclick="selectFinger(2)">M</button>
        <button class="finger-btn" onclick="selectFinger(3)">A</button>
        <button class="finger-btn" onclick="selectFinger(4)">m</button>
    </div>

    <div class="scroll-row" id="shapeRow">
        <div class="chip active" onclick="setShape('almond', this)">Almendra Pro</div>
        <div class="chip" onclick="setShape('coffin', this)">Coffin Elite</div>
        <div class="chip" onclick="setShape('stiletto', this)">Stiletto Drama</div>
        <div class="chip" onclick="setShape('square-long', this)">XL Square</div>
    </div>

    <div class="scroll-row">
        <input type="color" id="colorPicker" value="#ff0077" style="width:40px; height:40px; border:none; background:none; cursor:pointer;">
        <div class="chip" onclick="setColor('#7a00ff')">Morado</div>
        <div class="chip" onclick="setColor('#00f2ff')">Cian</div>
        <div class="chip" onclick="setColor('#ff0000')">Rojo Fuego</div>
    </div>

    <button class="btn-pdf" onclick="generatePDF()">📥 DESCARGAR DISEÑO PDF PROFESIONAL</button>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    // Estado del diseño por dedo: [Pulgar, Índice, Medio, Anular, Meñique]
    let nailState = Array(5).fill().map(() => ({ color: "#ff0077", shape: "almond" }));
    let selectedFinger = 'all'; // 'all' o índice 0-4
    let isFrontCamera = true;
    let cameraInstance = null;

    // Configuración de IA equilibrada para realismo y fluidez
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    function selectFinger(index) {
        selectedFinger = index;
        document.querySelectorAll('.finger-btn').forEach((btn, i) => {
            btn.classList.toggle('selected', index === 'all' ? i === 0 : i === (index + 1));
        });
    }

    function setShape(shape, el) {
        updateNail('shape', shape);
        document.querySelectorAll('#shapeRow .chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    function setColor(color) { updateNail('color', color); }
    document.getElementById('colorPicker').oninput = (e) => updateNail('color', e.target.value);

    function updateNail(prop, value) {
        if (selectedFinger === 'all') {
            nailState.forEach(n => n[prop] = value);
        } else {
            nailState[selectedFinger][prop] = value;
        }
    }

    // --- EL SECRETO DEL HIPERREALISMO ---
    function drawHyperRealisticNail(ctx, x, y, angle, dist, state) {
        // Ajustamos la uña para que nazca más cerca de la cutícula anatómica
        const xCuticle = x - Math.cos(angle - Math.PI/2) * (dist * 0.12);
        const yCuticle = y - Math.sin(angle - Math.PI/2) * (dist * 0.12);

        let nW = dist * 0.88; // Ancho realista basado en perspectiva
        let nH = (state.shape === 'stiletto' || state.shape === 'coffin' || state.shape === 'square-long') ? nW * 2.8 : nW * 1.8; // Largo acrílico

        ctx.save();
        ctx.translate(xCuticle, yCuticle);
        ctx.rotate(angle);

        // --- PATH DE LA UÑA ---
        ctx.beginPath();
        if(state.shape === 'almond') {
            ctx.ellipse(0, -nH/4, nW/2, nH/2, 0, 0, 2 * Math.PI);
        } else if(state.shape === 'stiletto') {
            ctx.moveTo(-nW/2, 0); ctx.lineTo(0, -nH); ctx.lineTo(nW/2, 0); ctx.arc(0, 0, nW/2, 0, Math.PI);
        } else if(state.shape === 'coffin') {
            ctx.moveTo(-nW/2, 0); ctx.lineTo(-nW/3, -nH); ctx.lineTo(nW/3, -nH); ctx.lineTo(nW/2, 0); ctx.arc(0, 0, nW/2, 0, Math.PI);
        } else {
            ctx.roundRect(-nW/2, -nH, nW, nH+5, [4, 4, 0, 0]); // XL Square
        }
        ctx.clip(); // Cortamos todo lo que dibujemos dentro de este path

        // --- CAPA 1: COLOR BASE CON VOLUMEN FÍSICO (Oclusión) ---
        // Creamos un degradado radial interno para simular la curvatura de la uña
        let nailGrad = ctx.createRadialGradient(0, -nH/2, nW/4, 0, -nH/2, nW);
        nailGrad.addColorStop(0, state.color); // Centro más claro
        nailGrad.addColorStop(1, adjustColor(state.color, -35)); // Bordes más oscuros (volumen)
        
        ctx.fillStyle = nailGrad;
        ctx.fillRect(-nW, -nH*1.2, nW*2, h*2); // Dibujamos la base

        // --- CAPA 2: REFLEJO ESPECULAR ESTRUCTURADO (Glow Pro) ---
        // Simulamos el reflejo perfecto de una lámpara de salón profesional en la punta de la uña
        let shineGrad = ctx.createLinearGradient(-nW/2, -nH, nW/2, 0);
        shineGrad.addColorStop(0, 'rgba(255,255,255,0.45)'); // Brillo intenso en la punta
        shineGrad.addColorStop(0.3, 'transparent'); // Transición suave
        
        ctx.fillStyle = shineGrad;
        ctx.fill(); // Rellenamos el path clipado

        ctx.restore();
    }

    // Función inteligente para ajustar brillo del color (para sombras físicas)
    function adjustColor(hex, amt) {
        var usePound = true;
        if (hex[0] == "#") { hex = hex.slice(1); usePound = true; }
        var num = parseInt(hex,16);
        var r = (num >> 16) + amt;
        if (r > 255) r = 255; else if  (r < 0) r = 0;
        var b = ((num >> 8) & 0x00FF) + amt;
        if (b > 255) b = 255; else if  (b < 0) b = 0;
        var g = (num & 0x0000FF) + amt;
        if (g > 255) g = 255; else if (g < 0) g = 0;
        return (usePound?"#":"") + (g | (b << 8) | (r << 16)).toString(16);
    }

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Espejo (translate -> scale -> translate back)
        if (isFrontCamera) {
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
        }
        
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                const tips = [4, 8, 12, 16, 20]; // Puntas
                const joints = [3, 7, 11, 15, 19]; // Nudillos superiores

                tips.forEach((tipIdx, i) => {
                    const tip = landmarks[tipIdx];
                    const joint = landmarks[joints[i]];
                    const x = tip.x * canvasElement.width;
                    const y = tip.y * canvasElement.height;
                    const dX = joint.x * canvasElement.width;
                    const dY = joint.y * canvasElement.height;
                    const angle = Math.atan2(y - dY, x - dX) + Math.PI/2;
                    const dist = Math.hypot(x - dX, y - dY);
                    
                    drawHyperRealisticNail(canvasCtx, x, y, angle, dist, nailState[i]);
                });
            }
        }
        canvasCtx.restore();
    }

    // --- INICIADOR DE CÁMARA PROFESIONAL (Voltear activado) ---
    function startCamera() {
        if (cameraInstance) { cameraInstance.stop(); } // Detiene cámara anterior para evitar bloqueos
        
        hands.onResults(onResults);
        
        cameraInstance = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480,
            facingMode: isFrontCamera ? 'user' : 'environment' // user = Frontal, environment = Trasera
        });
        cameraInstance.start();
    }

    function toggleCamera() {
        isFrontCamera = !isFrontCamera;
        startCamera();
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(22);
        doc.text("EME NAILS STUDIO - Ficha Técnica", 20, 20);
        nailState.forEach((n, i) => {
            let name = ["Pulgar", "Índice", "Medio", "Anular", "Meñique"][i];
            doc.setFontSize(12);
            doc.text(`${name}: Color ${n.color}, Forma ${n.shape.toUpperCase()}`, 20, 40 + (i * 10));
        });
        doc.save("eme-nails-diseno-profesional.pdf");
    }

    startCamera();
</script>

</body>
</html>
