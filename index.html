<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EME NAILS Studio & PDF</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --pink: #ff0077; --dark: #0a0a0a; }
        body { font-family: 'Arial', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        
        /* Interfaz de Diseño */
        .studio-panel {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.85); padding: 15px;
            border-top: 2px solid var(--pink); display: flex;
            flex-direction: column; gap: 10px; z-index: 10;
        }
        
        .controls-row { display: flex; justify-content: space-around; align-items: center; }
        .control-group { display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; }
        
        button { 
            background: #333; color: white; border: 1px solid #555; 
            padding: 8px 12px; border-radius: 10px; cursor: pointer;
        }
        button.active { border-color: var(--pink); background: var(--pink); }
        
        #container { position: relative; width: 100vw; height: 70vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        video { transform: scaleX(-1); } /* Espejo para video */

        .btn-pdf { background: #00ff88; color: black; font-weight: bold; border: none; padding: 10px; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="studio-panel">
    <div class="controls-row">
        <div class="control-group">
            <span>Color</span>
            <input type="color" id="colorPicker" value="#ff0077">
        </div>
        
        <div class="control-group">
            <span>Corte</span>
            <div style="display:flex; gap:5px;">
                <button onclick="setShape('natural')" id="btn-natural" class="active">Oval</button>
                <button onclick="setShape('stiletto')" id="btn-stiletto">Larga</button>
            </div>
        </div>

        <div class="control-group">
            <span>Arte</span>
            <select id="stickerSelect">
                <option value="none">Ninguno</option>
                <option value="🌸">Flores</option>
                <option value="⭐">Estrellas</option>
                <option value="💎">Brillos</option>
            </select>
        </div>
    </div>

    <button class="btn-pdf" onclick="generatePDF()">📥 Descargar Ficha Técnica (PDF)</button>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    let currentColor = "#ff0077";
    let currentShape = "natural";
    let currentSticker = "none";

    // Configuración de MediaPipe
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });

    function setShape(shape) {
        currentShape = shape;
        document.getElementById('btn-natural').classList.toggle('active', shape === 'natural');
        document.getElementById('btn-stiletto').classList.toggle('active', shape === 'stiletto');
    }

    document.getElementById('colorPicker').oninput = (e) => currentColor = e.target.value;
    document.getElementById('stickerSelect').onchange = (e) => currentSticker = e.target.value;

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Dibujar video espejo
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                const tips = [4, 8, 12, 16, 20];
                const joints = [3, 7, 11, 15, 19];

                tips.forEach((tipIdx, i) => {
                    const tip = landmarks[tipIdx];
                    const joint = landmarks[joints[i]];
                    
                    const x = tip.x * canvasElement.width;
                    const y = tip.y * canvasElement.height;
                    const jX = joint.x * canvasElement.width;
                    const jY = joint.y * canvasElement.height;

                    const angle = Math.atan2(y - jY, x - jX) + Math.PI/2;
                    const dist = Math.hypot(x - jX, y - jY);
                    
                    // Lógica de tamaño realista
                    let nailW = dist * 0.8;
                    let nailH = currentShape === "stiletto" ? nailW * 2.5 : nailW * 1.6;

                    canvasCtx.save();
                    canvasCtx.translate(x, y);
                    canvasCtx.rotate(angle);

                    // --- DIBUJO DE LA UÑA ---
                    canvasCtx.fillStyle = currentColor;
                    canvasCtx.shadowBlur = 10;
                    canvasCtx.shadowColor = "rgba(0,0,0,0.5)";
                    
                    canvasCtx.beginPath();
                    if(currentShape === "natural") {
                        canvasCtx.ellipse(0, -nailH/4, nailW/2, nailH/2, 0, 0, 2 * Math.PI);
                    } else {
                        // Forma Stiletto (Puntiaguda)
                        canvasCtx.moveTo(-nailW/2, 0);
                        canvasCtx.lineTo(0, -nailH);
                        canvasCtx.lineTo(nailW/2, 0);
                        canvasCtx.arc(0, 0, nailW/2, 0, Math.PI);
                    }
                    canvasCtx.fill();

                    // Brillo realista
                    const grad = canvasCtx.createLinearGradient(-nailW/2, 0, nailW/2, 0);
                    grad.addColorStop(0, "rgba(255,255,255,0.2)");
                    grad.addColorStop(0.5, "transparent");
                    canvasCtx.fillStyle = grad;
                    canvasCtx.fill();

                    // Sticker
                    if(currentSticker !== "none") {
                        canvasCtx.fillStyle = "white";
                        canvasCtx.font = `${nailW/2}px Arial`;
                        canvasCtx.textAlign = "center";
                        canvasCtx.fillText(currentSticker, 0, -nailH/3);
                    }

                    canvasCtx.restore();
                });
            }
        }
        canvasCtx.restore();
    }

    // GENERADOR DE PDF
    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(22);
        doc.text("EME NAILS - Ficha Técnica", 20, 20);
        
        doc.setFontSize(12);
        doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 20, 30);
        doc.text(`Color Base: ${currentColor}`, 20, 40);
        doc.text(`Corte Elegido: ${currentShape.toUpperCase()}`, 20, 50);
        doc.text(`Arte Adicional: ${currentSticker}`, 20, 60);
        
        doc.setDrawColor(255, 0, 119);
        doc.rect(15, 70, 180, 100);
        doc.text("Instrucciones para la Manicurista:", 20, 80);
        doc.text("1. Preparación de uña natural.", 20, 90);
        doc.text(`2. Aplicar gel base y 2 capas de color ${currentColor}.`, 20, 100);
        doc.text(`3. Esculpir forma ${currentShape} de longitud media/larga.`, 20, 110);
        doc.text(`4. Aplicar diseño de ${currentSticker} en zona central.`, 20, 120);
        
        doc.save("diseño-eme-nails.pdf");
        alert("¡PDF Descargado! Llévalo a tu salón favorito.");
    }

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start();
</script>
</body>
</html>
